# Deskflow server config for Mac → Pi cursor sharing.
# Layout: Pi is to the RIGHT of the Mac. Slide cursor off the right edge of the
# Mac to flow into the Pi screen. Slide back left to return.
#
# Usage on the Mac:
#
#   brew install deskflow
#   deskflow-server --no-daemon --no-tray --debug INFO \
#     --name "$(scutil --get LocalHostName)" \
#     --config /path/to/mac-server.conf \
#     --address :24800
#
# Update the screen names below to match `scutil --get LocalHostName` on your Mac
# and `hostname` on your Pi (default is "raspberrypi").

section: screens
    Saints-MacBook-Air:
    raspberrypi:
end

section: aliases
    Saints-MacBook-Air:
        mac
        macbook
    raspberrypi:
        pi
end

section: links
    Saints-MacBook-Air:
        right = raspberrypi
    raspberrypi:
        left = Saints-MacBook-Air
end

section: options
    # Cmd+Shift+L locks the cursor to the current screen (so you can't
    # accidentally fly off the edge while gaming, video editing, etc.)
    keystroke(super+shift+l) = lockCursorToScreen(toggle)
    # Match the Mac's natural scroll direction
    relativeMouseMoves = false
    screenSaverSync = true
end
