name: piKeyboard
options:
  bundleIdPrefix: com.assiamah
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
    watchOS: "10.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "0.2.5"
    CURRENT_PROJECT_VERSION: "7"
    DEVELOPMENT_TEAM: "QGMAWHX827"
    CODE_SIGN_STYLE: Automatic

targets:
  piKeyboard-iOS:
    type: application
    platform: iOS
    sources:
      - path: Sources/Shared
      - path: Sources/iOS
    info:
      path: Sources/iOS/Info.plist
      properties:
        CFBundleDisplayName: piKeyboard
        UILaunchScreen: {}
        NSLocalNetworkUsageDescription: "piKeyboard needs local network access to discover and control your Raspberry Pi."
        NSBonjourServices:
          - _pikeyboard._tcp
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.assiamah.piKeyboard
        TARGETED_DEVICE_FAMILY: "1,2"

  piKeyboard-macOS:
    type: application
    platform: macOS
    sources:
      - path: Sources/Shared
      - path: Sources/macOS
    info:
      path: Sources/macOS/Info.plist
      properties:
        CFBundleDisplayName: piKeyboard
        NSLocalNetworkUsageDescription: "piKeyboard needs local network access to discover and control your Raspberry Pi."
        NSBonjourServices:
          - _pikeyboard._tcp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.assiamah.piKeyboard.mac

  piKeyboard-watchOS:
    type: application
    platform: watchOS
    sources:
      - path: Sources/Shared
      - path: Sources/watchOS
    info:
      path: Sources/watchOS/Info.plist
      properties:
        CFBundleDisplayName: piKeyboard
        WKApplication: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.assiamah.piKeyboard.watch
